<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이브 온라인: 함대 교전 전술 대시보드</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Rajdhani:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-deep: #030308;
            --bg-panel: rgba(12, 12, 28, 0.85);
            --accent-cyan: #00f0ff;
            --accent-red: #ff3e3e;
            --accent-green: #00ff88;
            --accent-gold: #ffcc00;
            --text-dim: #707b94;
            --text-bright: #e1e3ea;
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Outfit', 'Noto Sans KR', sans-serif;
            --font-stat: 'Rajdhani', sans-serif;
            --transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: var(--text-bright);
            font-family: var(--font-main);
            overflow-x: hidden;
            letter-spacing: -0.02em;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255, 204, 0, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(255, 62, 62, 0.04) 0%, transparent 35%);
        }

        /* 미세한 그리드 배경 */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none; z-index: -1;
        }

        .dashboard { max-width: 1400px; margin: 0 auto; padding: 30px 20px; display: grid; gap: 24px; }

        /* 상단 요약 지표 */
        .stats-hero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; backdrop-filter: blur(15px); transition: var(--transition); border-bottom: 2px solid transparent; }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.15); background: rgba(16, 16, 36, 0.9); }
        
        .card-gold { border-bottom-color: var(--accent-gold); box-shadow: 0 10px 30px rgba(255, 204, 0, 0.05); }
        .card-red { border-bottom-color: var(--accent-red); box-shadow: 0 10px 30px rgba(255, 62, 62, 0.05); }
        .card-green { border-bottom-color: var(--accent-green); box-shadow: 0 10px 30px rgba(0, 255, 136, 0.05); }

        .stat-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-family: var(--font-stat); font-size: 2.5rem; font-weight: 700; line-height: 1; display: flex; align-items: baseline; gap: 6px; }
        .stat-unit { font-size: 1rem; color: var(--text-dim); font-weight: 400; }

        /* 메인 시각화 섹션 */
        .viz-section { background: var(--bg-panel); border-radius: 20px; padding: 25px; border: 1px solid var(--glass-border); position: relative; }
        .viz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .viz-title { font-family: var(--font-stat); font-size: 1.4rem; letter-spacing: 3px; color: var(--accent-cyan); font-weight: 700; }

        .chart-container { width: 100%; height: 320px; position: relative; cursor: crosshair; }
        .chart-svg { width: 100%; height: 100%; overflow: visible; }
        
        .axis-line { stroke: rgba(255, 255, 255, 0.06); stroke-width: 1; }
        .zero-line { stroke: rgba(255, 255, 255, 0.2); stroke-width: 1.5; stroke-dasharray: 6,4; }
        
        .pulse-path { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        .pulse-area { fill-opacity: 0.12; stroke: none; pointer-events: none; }
        
        .path-out { stroke: var(--accent-gold); filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.5)); }
        .area-out { fill: var(--accent-gold); }
        .path-in { stroke: var(--accent-red); filter: drop-shadow(0 0 10px rgba(255, 62, 62, 0.5)); }
        .area-in { fill: var(--accent-red); }
        .path-rep { stroke: var(--accent-green); stroke-width: 2; opacity: 0.8; filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.6)); }

        .time-cursor { position: absolute; top: 0; width: 1px; height: 100%; background: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); display: none; pointer-events: none; z-index: 10; }
        
        /* 툴팁 */
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(4, 4, 12, 0.98);
            border: 1px solid var(--accent-cyan); padding: 18px; border-radius: 12px;
            display: none; z-index: 500; min-width: 230px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px);
        }
        .tooltip-header { font-family: var(--font-stat); font-size: 1.2rem; color: var(--accent-cyan); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; }
        .tooltip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tooltip-label { color: var(--text-dim); font-size: 0.8rem; font-weight: 600; }
        .tooltip-val { font-family: var(--font-stat); font-size: 1.25rem; font-weight: 700; }

        /* 로그 그리드 */
        .log-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; margin-top: 10px; }
        .no-data { grid-column: 1/-1; height: 250px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 1rem; border: 1px dashed var(--glass-border); border-radius: 20px; }

        .log-section-title { grid-column: 1 / -1; font-family: var(--font-stat); font-size: 1.5rem; color: var(--accent-gold); letter-spacing: 2px; margin-top: 10px; display: flex; align-items: center; gap: 15px; }
        .log-section-title::after { content: ''; flex-grow: 1; height: 1px; background: linear-gradient(90deg, var(--glass-border), transparent); }

        .log-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 18px; transition: var(--transition); animation: slideIn 0.4s ease-out; position: relative; }
        .log-card:hover { background: rgba(255, 255, 255, 0.07); transform: scale(1.02); }
        .log-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; border-radius: 4px 0 0 4px; }
        
        .c-out::before { background: var(--accent-gold); }
        .c-in::before { background: var(--accent-red); }
        .c-rep::before { background: var(--accent-green); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ship-img { width: 52px; height: 52px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); flex-shrink: 0; }
        .log-body { flex-grow: 1; overflow: hidden; }
        .log-time { font-family: monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 2px; }
        .log-desc { font-size: 0.95rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .log-num { font-family: var(--font-stat); font-size: 1.6rem; font-weight: 700; min-width: 90px; text-align: right; }
        .num-gold { color: var(--accent-gold); }
        .num-red { color: var(--accent-red); }
        .num-green { color: var(--accent-green); }

        .highlight { color: var(--accent-cyan); font-weight: 600; }
        
        .mit-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; font-family: var(--font-stat); letter-spacing: 1px; }
        .status-bleeding { background: rgba(255, 62, 62, 0.15); color: #ff6060; border: 1px solid rgba(255, 62, 62, 0.3); }
        .status-stable { background: rgba(0, 240, 255, 0.15); color: var(--accent-cyan); border: 1px solid rgba(0, 240, 255, 0.3); }
        .status-holding { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); border: 1px solid rgba(0, 255, 136, 0.3); }

        .footer { margin-top: 40px; text-align: center; color: #333; font-size: 0.7rem; letter-spacing: 2px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 통합 지표 헤더 -->
    <section class="stats-hero">
        <div class="stat-card card-gold">
            <div class="stat-label">평균 타격 화력 (공격)</div>
            <div class="stat-value" id="val-avg-out">0<span class="stat-unit">DPS</span></div>
        </div>
        <div class="stat-card card-red">
            <div class="stat-label">최고 피격 압박 (방어)</div>
            <div class="stat-value" id="val-peak-in">0<span class="stat-unit">PEAK</span></div>
        </div>
        <div class="stat-card card-green">
            <div class="stat-label">전체 복구 효율 (로지)</div>
            <div class="stat-value" id="val-mit-total">0<span class="stat-unit">%</span></div>
        </div>
    </section>

    <!-- 전술 교전 펄스 그래프 -->
    <section class="viz-section">
        <div class="viz-header">
            <div class="viz-title">GRID ENGAGEMENT PULSE: 전술 밸런스</div>
            <div style="font-size: 0.75rem; color: var(--text-dim); text-align: right;">분 단위 정밀 교전 분석 // 60MIN 실시간 아카이브</div>
        </div>

        <div class="chart-container" id="chart-area">
            <svg id="svg-chart" class="chart-svg" preserveAspectRatio="none">
                <line x1="0" y1="25%" x2="100%" y2="25%" class="axis-line"></line>
                <line x1="0" y1="75%" x2="100%" y2="75%" class="axis-line"></line>
                <line x1="0" y1="50%" x2="100%" y2="50%" class="zero-line"></line>
                
                <path id="path-out-area" class="pulse-area area-out"></path>
                <path id="path-out" class="pulse-path path-out"></path>
                
                <path id="path-in-area" class="pulse-area area-in"></path>
                <path id="path-in" class="pulse-path path-in"></path>
                
                <path id="path-rep" class="pulse-path path-rep"></path>
            </svg>
            <div id="time-cursor" class="time-cursor"></div>
            <div id="tooltip" class="tooltip"></div>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 30px; margin-top: 20px;">
            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim);">
                <div style="width: 16px; height: 3px; background: var(--accent-gold); border-radius: 1px;"></div> 우리 화력
            </div>
            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim);">
                <div style="width: 16px; height: 3px; background: var(--accent-red); border-radius: 1px;"></div> 발생 위협
            </div>
            <div style="display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-dim);">
                <div style="width: 16px; height: 1.5px; background: var(--accent-green); border-bottom: 2px dashed var(--accent-green);"></div> 로지 대응
            </div>
        </div>
    </section>

    <!-- 상세 전술 로그 -->
    <div id="log-display" class="log-grid">
        <div class="no-data">그래프의 특정 분대를 클릭하여 상세 리포트를 확인하십시오.</div>
    </div>

    <footer class="footer">
        &copy; 2026 EVETECH TACTICAL DASHBOARD // KOREAN LOCALIZATION ACTIVE
    </footer>
</div>

<script src="mock_logs.js"></script>
<script>
    const SHIP_IMG = {
        "바르거": 28664, "슬레이프니르": 22440, "댐네이션": 22470, "디보우터": 11983,
        "앱솔루션": 22444, "팔라딘": 28659, "에리스": 22448, "로디바": 52712
    };

    let ALL_LOGS = [];
    let BUCKETS = new Map();

    function parse(c) {
        let type = 'msg', val = 0, isOut = false;
        const clean = c.replace(/\((combat|notify)\)/, '').trim();
        if (c.includes('(combat)')) {
            const v = clean.match(/^(\d+):/);
            if (v) {
                val = parseInt(v[1]);
                type = (clean.includes('수리') || clean.includes('전송')) ? 'rep' : 'dmg';
                if (type === 'dmg') {
                    const actor = clean.split('시전자 - ')[1]?.split(',')[0];
                    if (actor && SHIP_IMG[actor]) isOut = true;
                }
            } else type = 'tackle';
        }
        let desc = clean.replace(/^(\d+):\s*/, '');
        desc = desc.replace(/(시전자 - .*?)(?=, 대상 -|$)/, `<span class="highlight">$&</span>`);
        
        let iconId = 670;
        for (let k in SHIP_IMG) if (c.includes(k)) iconId = SHIP_IMG[k];
        return { type, val, isOut, desc, icon: `https://images.evetech.net/types/${iconId}/render?size=64` };
    }

    function bezier(p) {
        if (p.length < 2) return "";
        let d = `M ${p[0].x} ${p[0].y}`;
        for (let i = 0; i < p.length - 1; i++) {
            const m = (p[i].x + p[i+1].x) / 2;
            d += ` C ${m} ${p[i].y}, ${m} ${p[i+1].y}, ${p[i+1].x} ${p[i+1].y}`;
        }
        return d;
    }

    function renderLogs(idx = null) {
        const grid = document.getElementById('log-display');
        if (idx === null) {
            grid.innerHTML = `<div class="no-data">그래프의 특정 분대를 클릭하여 상세 리포트를 확인하십시오.</div>`;
            return;
        }
        const b = BUCKETS.get(idx);
        const start = new Date(ALL_LOGS[0].timestamp.replace(/-/g, '/')).getTime();
        const filtered = ALL_LOGS.filter(l => Math.floor((new Date(l.timestamp.replace(/-/g, '/')).getTime()-start)/60000) === idx);
        
        let html = `<div class="log-section-title">상세 전술 분석 [${b.timeStr}]</div>`;
        filtered.forEach(l => {
            const p = parse(l.content);
            let card = 'c-in', num = 'num-red', pre = '!';
            if (p.type === 'rep') { card = 'c-rep'; num = 'num-green'; pre = '+'; }
            else if (p.isOut) { card = 'c-out'; num = 'num-gold'; pre = 'OUT '; }

            html += `
                <div class="log-card ${card}">
                    <img src="${p.icon}" class="ship-img">
                    <div class="log-body">
                        <div class="log-time">${l.timestamp.split(' ')[1]}</div>
                        <div class="log-desc">${p.desc}</div>
                    </div>
                    ${p.val > 0 ? `<div class="log-num ${num}">${pre}${p.val.toLocaleString()}</div>` : ''}
                </div>
            `;
        });
        grid.innerHTML = html;
        window.scrollTo({ top: grid.offsetTop - 400, behavior: 'smooth' });
    }

    function draw(logs) {
        const start = new Date(logs[0].timestamp.replace(/-/g, '/')).getTime();
        const end = new Date(logs[logs.length-1].timestamp.replace(/-/g, '/')).getTime();
        const duration = Math.ceil((end - start) / 60000);

        BUCKETS.clear();
        let tOut = 0, tIn = 0, tRep = 0;

        logs.forEach(l => {
            const idx = Math.floor((new Date(l.timestamp.replace(/-/g, '/')).getTime()-start)/60000);
            if (!BUCKETS.has(idx)) BUCKETS.set(idx, { out: 0, in: 0, rep: 0, timeStr: l.timestamp.substring(11, 16) });
            const p = parse(l.content);
            const b = BUCKETS.get(idx);
            if (p.type === 'dmg') { if (p.isOut) { b.out += p.val; tOut += p.val; } else { b.in += p.val; tIn += p.val; } }
            else if (p.type === 'rep') { b.rep += p.val; tRep += p.val; }
        });

        document.getElementById('val-avg-out').innerHTML = Math.floor(tOut/duration/60).toLocaleString() + '<span class="stat-unit">DPS</span>';
        document.getElementById('val-peak-in').innerHTML = Math.max(...Array.from(BUCKETS.values()).map(b=>b.in)).toLocaleString() + '<span class="stat-unit">PEAK</span>';
        document.getElementById('val-mit-total').innerHTML = (tIn > 0 ? Math.min(100, (tRep/tIn)*100) : 0).toFixed(1) + '<span class="stat-unit">%</span>';

        const svg = document.getElementById('svg-chart');
        const W = svg.clientWidth, H = svg.clientHeight, zero = H / 2;
        const max = Math.max(...Array.from(BUCKETS.values()).map(b => Math.max(b.out, b.in, b.rep)), 1000);

        const pOut = [], pIn = [], pRep = [];
        for (let i = 0; i <= duration; i++) {
            const b = BUCKETS.get(i) || { out: 0, in: 0, rep: 0 };
            const x = (i / duration) * W;
            pOut.push({ x, y: zero - (b.out / max) * zero * 0.94 });
            pIn.push({ x, y: zero + (b.in / max) * zero * 0.94 });
            const ry = zero + (b.in/max)*zero*0.94 - (b.rep/max)*zero*0.85;
            pRep.push({ x, y: Math.min(zero + (b.in/max)*zero*0.94, ry) });
        }

        document.getElementById('path-out').setAttribute('d', bezier(pOut));
        document.getElementById('path-out-area').setAttribute('d', bezier(pOut) + ` L ${W} ${zero} L 0 ${zero} Z`);
        document.getElementById('path-in').setAttribute('d', bezier(pIn));
        document.getElementById('path-in-area').setAttribute('d', bezier(pIn) + ` L ${W} ${zero} L 0 ${zero} Z`);
        document.getElementById('path-rep').setAttribute('d', bezier(pRep));

        const area = document.getElementById('chart-area'), tt = document.getElementById('tooltip'), cur = document.getElementById('time-cursor');
        area.onmousemove = (e) => {
            const rect = area.getBoundingClientRect(), x = e.clientX - rect.left;
            const idx = Math.round((x/W)*duration), b = BUCKETS.get(idx);
            if (b) {
                cur.style.display = 'block'; cur.style.left = `${(idx/duration)*100}%`;
                tt.style.display = 'block'; tt.style.left = `${x > W/2 ? x-260 : x+30}px`; tt.style.top = `20px`;
                const ratio = b.in > 0 ? Math.min(100, (b.rep/b.in)*100) : 0;
                const status = ratio >= 90 ? 'HOLDING' : (ratio >= 60 ? 'STABLE' : 'BLEEDING');
                const krStatus = ratio >= 90 ? '방어선 유지' : (ratio >= 60 ? '교전 안정' : '피해 발생');
                const badge = ratio >= 90 ? 'status-holding' : (ratio >= 60 ? 'status-stable' : 'status-bleeding');
                tt.innerHTML = `<div class="tooltip-header"><span>${b.timeStr}</span><span class="mit-badge ${badge}">${krStatus}</span></div><div class="tooltip-row"><span class="tooltip-label">화력 투사 (공격)</span><span class="tooltip-val" style="color:var(--accent-gold)">+${b.out.toLocaleString()}</span></div><div class="tooltip-row"><span class="tooltip-label">발생 위협 (피격)</span><span class="tooltip-val" style="color:var(--accent-red)">-${b.in.toLocaleString()}</span></div><div class="tooltip-row"><span class="tooltip-label">로지 대응 (복구)</span><span class="tooltip-val" style="color:var(--accent-green)">+${b.rep.toLocaleString()}</span></div><div class="tooltip-row" style="margin-top:10px; border-top:1px dashed rgba(255,255,255,0.1); padding-top:8px;"><span class="tooltip-label">효율</span><span class="tooltip-val" style="color:${ratio>=90?'var(--accent-green)':'var(--accent-red)'}">${ratio.toFixed(1)}%</span></div>`;
            }
        };
        area.onmouseleave = () => { tt.style.display = 'none'; cur.style.display = 'none'; };
        area.onclick = (e) => { const rect = area.getBoundingClientRect(); renderLogs(Math.round(((e.clientX-rect.left)/W)*duration)); };
        area.ondblclick = () => renderLogs(null);
    }

    async function init() {
        if (typeof MOCK_LOGS !== 'undefined') { ALL_LOGS = MOCK_LOGS; draw(ALL_LOGS); renderLogs(null); }
        document.getElementById('current-time').innerText = new Date().toISOString().replace('T', ' ').substring(0, 19);
    }
    init();
    window.onresize = () => draw(ALL_LOGS);
</script>
</body>
</html>
