<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이브 온라인: 함대 전술 관제 시스템</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Rajdhani:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        :root {
            --bg-deep: #010103;
            --bg-panel: rgba(6, 6, 12, 0.98);
            --accent-blue: #007aff;   /* 아군 화력 */
            --accent-red: #ff3333;    /* 적군 화력 */
            --accent-green: #00e676;  /* 로지 대응 */
            --accent-cyan: #00d8ff;
            --text-dim: #4b5563;
            --text-bright: #e5e7eb;
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Outfit', 'Noto Sans KR', sans-serif;
            --font-stat: 'Rajdhani', sans-serif;
            --transition: all 0.2s ease-out;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-deep);
            color: var(--text-bright);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        .dashboard { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; gap: 16px; }

        .stats-hero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--glass-border); border-radius: 8px; padding: 16px; border-top: 3px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .card-blue { border-top-color: var(--accent-blue); }
        .card-red { border-top-color: var(--accent-red); }
        .card-green { border-top-color: var(--accent-green); }
        .card-cyan { border-top-color: var(--accent-cyan); }

        .stat-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
        .stat-value { font-family: var(--font-stat); font-size: 2.2rem; font-weight: 700; line-height: 1; display: flex; align-items: baseline; gap: 4px; }
        .stat-unit { font-size: 0.9rem; color: var(--text-dim); font-weight: 400; }

        .viz-section { background: var(--bg-panel); border-radius: 12px; padding: 24px; border: 1px solid var(--glass-border); position: relative; }
        .viz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .viz-title { font-family: var(--font-stat); font-size: 1.1rem; letter-spacing: 1px; color: var(--accent-cyan); font-weight: 700; }

        .chart-container { width: 100%; height: 380px; position: relative; cursor: crosshair; }
        .chart-svg { width: 100%; height: 100%; overflow: visible; }
        
        .axis-line { stroke: rgba(255, 255, 255, 0.03); stroke-width: 1; }
        .base-line { stroke: rgba(255, 255, 255, 0.08); stroke-width: 1; }
        
        .pulse-path { fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        .pulse-area { fill-opacity: 0.08; stroke: none; pointer-events: none; }
        
        .path-out { stroke: var(--accent-blue); }
        .area-out { fill: var(--accent-blue); }
        .path-in { stroke: var(--accent-red); }
        .area-in { fill: var(--accent-red); }
        .path-rep { stroke: var(--accent-green); stroke-width: 1.8; opacity: 0.9; }

        .time-cursor { position: absolute; top: 0; width: 1px; height: 100%; background: var(--accent-cyan); display: none; pointer-events: none; z-index: 10; opacity: 0.5; }
        
        .marker-line { position: absolute; width: 1px; border-left: 1px dashed rgba(255,255,255,0.15); z-index: 15; pointer-events: none; height: 100%; top: 0; }

        /* 함선 파괴 마커: 아이콘 보존 + 소형 해골 배지 */
        .destroy-marker { position: absolute; width: 36px; height: 36px; border-radius: 4px; background: #000; border: 1.5px solid; z-index: 20; transform: translate(-50%, -50%); transition: var(--transition); cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: visible; }
        .destroy-marker:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 30; }
        
        /* 배지 스타일 해골 마커 */
        .destroy-marker::after { content: '💀'; position: absolute; top: -8px; right: -8px; font-size: 14px; background: #000; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid inherit; box-shadow: 0 0 5px rgba(0,0,0,0.8); z-index: 5; }
        
        .marker-kill { border-color: var(--accent-blue); }
        .marker-kill::after { border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .marker-loss { border-color: var(--accent-red); }
        .marker-loss::after { border-color: var(--accent-red); color: var(--accent-red); }
        
        .marker-img { width: 100%; height: 100%; border-radius: 3px; z-index: 1; object-fit: cover; }

        .tooltip {
            position: absolute; pointer-events: none; background: #08080c;
            border: 1px solid var(--glass-border); padding: 12px; border-radius: 6px;
            display: none; z-index: 500; min-width: 180px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.8);
        }
        .tooltip-header { font-family: var(--font-stat); font-size: 1rem; color: var(--accent-cyan); margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 4px; }
        .tooltip-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .tooltip-label { color: var(--text-dim); font-size: 0.7rem; font-weight: 600; }
        .tooltip-val { font-family: var(--font-stat); font-size: 1rem; font-weight: 700; }

        .log-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 10px; margin-top: 5px; }
        .no-data { grid-column: 1/-1; height: 150px; display: flex; align-items: center; justify-content: center; color: #333; font-size: 0.85rem; border: 1px dashed var(--glass-border); border-radius: 8px; }

        .log-section-title { grid-column: 1 / -1; font-family: var(--font-stat); font-size: 1.1rem; color: var(--accent-cyan); letter-spacing: 1px; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .log-section-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--glass-border); }

        .log-card { background: rgba(255, 255, 255, 0.015); border: 1px solid var(--glass-border); border-radius: 6px; padding: 10px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.2s ease-out; position: relative; }
        .log-card::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px; }
        
        .c-out::before { background: var(--accent-blue); }
        .c-in::before { background: var(--accent-red); }
        .c-rep::before { background: var(--accent-green); }
        .c-kill::before { background: var(--accent-blue); }
        .c-loss::before { background: var(--accent-red); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

        .ship-img { width: 44px; height: 44px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.05); flex-shrink: 0; }
        .log-body { flex-grow: 1; overflow: hidden; }
        .log-desc { font-size: 1rem; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .log-num { font-family: var(--font-stat); font-size: 1.5rem; font-weight: 700; min-width: 80px; text-align: right; }
        .num-blue { color: var(--accent-blue); }
        .num-red { color: var(--accent-red); }
        .num-green { color: var(--accent-green); }

        .highlight { color: var(--accent-cyan); font-weight: 600; }
        .footer { margin-top: 30px; text-align: center; color: #222; font-size: 0.65rem; letter-spacing: 1px; padding-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <section class="stats-hero">
        <div class="stat-card card-blue">
            <div class="stat-label">아군 투사 화력</div>
            <div class="stat-value" id="val-avg-out">0<span class="stat-unit">DPS</span></div>
        </div>
        <div class="stat-card card-red">
            <div class="stat-label">적군 위협 압박</div>
            <div class="stat-value" id="val-peak-in">0<span class="stat-unit">PEAK</span></div>
        </div>
        <div class="stat-card card-green">
            <div class="stat-label">누적 복구 효율</div>
            <div class="stat-value" id="val-mit-total">0<span class="stat-unit">%</span></div>
        </div>
        <div class="stat-card card-cyan">
            <div class="stat-label">격침 / 손실</div>
            <div class="stat-value" style="color:var(--accent-blue)"><span id="val-kills">0</span><span class="stat-unit" style="margin:0 4px">/</span><span id="val-losses" style="color:var(--accent-red)">0</span></div>
        </div>
    </section>

    <section class="viz-section">
        <div class="viz-header">
            <div class="viz-title">GRID ENGAGEMENT MONITOR // 전술 관제 시스템</div>
            <div style="font-size: 0.65rem; color: var(--text-dim);">상단 경계: 적 격침 / 하단 경계: 아군 손실</div>
        </div>

        <div class="chart-container" id="chart-area">
            <svg id="svg-chart" class="chart-svg" preserveAspectRatio="none">
                <line x1="0" y1="25%" x2="100%" y2="25%" class="axis-line"></line>
                <line x1="0" y1="50%" x2="100%" y2="50%" class="axis-line"></line>
                <line x1="0" y1="75%" x2="100%" y2="75%" class="axis-line"></line>
                <line x1="0" y1="100%" x2="100%" y2="100%" class="base-line"></line>
                
                <path id="path-in-area" class="pulse-area area-in"></path>
                <path id="path-in" class="pulse-path path-in"></path>
                
                <path id="path-rep-area" class="pulse-area area-rep" style="fill: var(--accent-green); fill-opacity: 0.12;"></path>
                <path id="path-rep" class="pulse-path path-rep"></path>

                <path id="path-out-area" class="pulse-area area-out"></path>
                <path id="path-out" class="pulse-path path-out"></path>
            </svg>
            <div id="marker-layer"></div>
            <div id="time-cursor" class="time-cursor"></div>
            <div id="tooltip" class="tooltip"></div>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
            <div style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim);">
                <div style="width: 12px; height: 3px; background: var(--accent-blue); border-radius: 1px;"></div> 아군 화력
            </div>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim);">
                <div style="width: 12px; height: 3px; background: var(--accent-red); border-radius: 1px;"></div> 적군 화력
            </div>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim);">
                <div style="width: 12px; height: 2px; background: var(--accent-green);"></div> 로지 복구
            </div>
        </div>
    </section>

    <div id="log-display" class="log-grid">
        <div class="no-data">리포트 생성을 위해 차트의 특정 시점을 선택하십시오.</div>
    </div>
</div>

<script src="mock_logs.js"></script>
<script>
    const SHIP_IMG = {
        "바르거": 28664, "슬레이프니르": 22440, "댐네이션": 22470, "디보우터": 11983,
        "앱솔루션": 22444, "팔라딘": 28659, "에리스": 22448, "Tempest FI": 3529,
        "Maelstrom": 631, "Raven NI": 33157, "Hurricane": 523, "Scythe": 627, "Osprey": 626
    };

    let ALL_LOGS = [];
    let BUCKETS = new Map();
    let DESTROY_EVENTS = [];

    function parse(c) {
        let type = 'msg', val = 0, isOut = false;
        const clean = c.replace(/\((combat|notify)\)/, '').trim();
        if (c.includes('(combat)')) {
            if (clean.startsWith('KILL:')) type = 'kill';
            else if (clean.startsWith('LOSS:')) type = 'loss';
            else {
                const v = clean.match(/^(\d+):/);
                if (v) {
                    val = parseInt(v[1]);
                    type = (clean.includes('수리') || clean.includes('전송')) ? 'rep' : 'dmg';
                    if (type === 'dmg') {
                        const actor = clean.split('시전자: ')[1]?.split(',')[0] || clean.split('시전자 - ')[1]?.split(',')[0];
                        if (actor && SHIP_IMG[actor] && !["Tempest FI", "Maelstrom", "Raven NI", "Hurricane", "Scythe", "Osprey"].includes(actor)) isOut = true;
                    }
                } else type = 'tackle';
            }
        }
        let desc = clean.replace(/^(\d+):\s*/, '').replace(/(KILL|LOSS):\s*/, '');
        for (let k in SHIP_IMG) if (c.includes(k)) {
            desc = desc.replace(k, `<span class="highlight">${k}</span>`);
        }
        let iconId = 670;
        for (let k in SHIP_IMG) if (c.includes(k)) iconId = SHIP_IMG[k];
        return { type, val, isOut, desc, icon: `https://images.evetech.net/types/${iconId}/render?size=128` };
    }

    function bezier(p) {
        if (p.length < 2) return "";
        let d = `M ${p[0].x} ${p[0].y}`;
        for (let i = 0; i < p.length - 1; i++) {
            const m = (p[i].x + p[i+1].x) / 2;
            d += ` C ${m} ${p[i].y}, ${m} ${p[i+1].y}, ${p[i+1].x} ${p[i+1].y}`;
        } return d;
    }

    function renderLogs(idx = null) {
        const grid = document.getElementById('log-display');
        if (idx === null) { grid.innerHTML = `<div class="no-data">리포트 생성을 위해 차트의 특정 시점을 선택하십시오.</div>`; return; }
        const b = BUCKETS.get(idx);
        const start = new Date(ALL_LOGS[0].timestamp.replace(/-/g, '/')).getTime();
        const filtered = ALL_LOGS.filter(l => Math.floor((new Date(l.timestamp.replace(/-/g, '/')).getTime()-start)/60000) === idx);
        
        let html = `<div class="log-section-title">분 단위 리포트 [${b.timeStr}]</div>`;
        filtered.forEach(l => {
            const p = parse(l.content);
            let card = 'c-in', numStyle = 'num-red', pre = '!';
            if (p.type === 'rep') { card = 'c-rep'; numStyle = 'num-green'; pre = '+'; }
            else if (p.isOut || p.type === 'kill') { card = p.type==='kill'?'c-kill':'c-out'; numStyle = 'num-blue'; pre = p.type==='kill'?'[전과] ':''; }
            else if (p.type === 'loss') { card = 'c-loss'; numStyle = 'num-red'; pre = '[손실] '; }
            html += `<div class="log-card ${card}"><img src="${p.icon}" class="ship-img"><div class="log-body"><div class="log-desc">${p.desc}</div></div>${p.val > 0 ? `<div class="log-num ${numStyle}">${pre}${p.val.toLocaleString()}</div>` : ''}</div>`;
        });
        grid.innerHTML = html;
        window.scrollTo({ top: grid.offsetTop - 300, behavior: 'smooth' });
    }

    function draw(logs) {
        const start = new Date(logs[0].timestamp.replace(/-/g, '/')).getTime();
        const end = new Date(logs[logs.length-1].timestamp.replace(/-/g, '/')).getTime();
        const duration = Math.ceil((end - start) / 60000);

        BUCKETS.clear(); DESTROY_EVENTS = [];
        let tOut = 0, tIn = 0, tRep = 0, kCount = 0, lCount = 0;

        logs.forEach(l => {
            const time = new Date(l.timestamp.replace(/-/g, '/')).getTime();
            const idx = Math.floor((time - start) / 60000);
            if (!BUCKETS.has(idx)) BUCKETS.set(idx, { out: 0, in: 0, rep: 0, timeStr: l.timestamp.substring(11, 16) });
            const p = parse(l.content);
            const b = BUCKETS.get(idx);
            if (p.type === 'dmg') { if (p.isOut) { b.out += p.val; tOut += p.val; } else { b.in += p.val; tIn += p.val; } }
            else if (p.type === 'rep') { b.rep += p.val; tRep += p.val; }
            else if (p.type === 'kill') { kCount++; DESTROY_EVENTS.push({ idx, type: 'kill', icon: p.icon }); }
            else if (p.type === 'loss') { lCount++; DESTROY_EVENTS.push({ idx, type: 'loss', icon: p.icon }); }
        });

        document.getElementById('val-avg-out').innerHTML = Math.floor(tOut/duration/60).toLocaleString() + '<span class="stat-unit">DPS</span>';
        document.getElementById('val-peak-in').innerHTML = Math.max(...Array.from(BUCKETS.values()).map(b=>b.in)).toLocaleString() + '<span class="stat-unit">PEAK</span>';
        document.getElementById('val-mit-total').innerHTML = (tIn > 0 ? Math.min(100, (tRep/tIn)*100) : 0).toFixed(1) + '<span class="stat-unit">%</span>';
        document.getElementById('val-kills').innerText = kCount;
        document.getElementById('val-losses').innerText = lCount;

        const svg = document.getElementById('svg-chart'), layer = document.getElementById('marker-layer');
        const W = svg.clientWidth, H = svg.clientHeight;
        const max = Math.max(...Array.from(BUCKETS.values()).map(b => Math.max(b.out, b.in, b.rep)), 1000);

        const po = [], pin = [], pr = [];
        for (let i = 0; i <= duration; i++) {
            const b = BUCKETS.get(i) || { out: 0, in: 0, rep: 0 };
            const x = (i / duration) * W;
            po.push({ x, y: H - (b.out / max) * H * 0.9 });
            pin.push({ x, y: H - (b.in / max) * H * 0.9 });
            pr.push({ x, y: H - (b.rep / max) * H * 0.9 });
        }

        document.getElementById('path-out').setAttribute('d', bezier(po));
        document.getElementById('path-out-area').setAttribute('d', bezier(po) + ` L ${W} ${H} L 0 ${H} Z`);
        document.getElementById('path-in').setAttribute('d', bezier(pin));
        document.getElementById('path-in-area').setAttribute('d', bezier(pin) + ` L ${W} ${H} L 0 ${H} Z`);
        document.getElementById('path-rep').setAttribute('d', bezier(pr));
        document.getElementById('path-rep-area').setAttribute('d', bezier(pr) + ` L ${W} ${H} L 0 ${H} Z`);

        layer.innerHTML = "";
        DESTROY_EVENTS.forEach(ev => {
            const xPos = (ev.idx / duration) * 100;
            // 킬 정보들을 그래프 위아래 경계선(0%, 100%)에 배치
            const yPos = ev.type === 'kill' ? 5 : 95;
            
            const line = document.createElement('div');
            line.className = 'marker-line';
            line.style.left = `${xPos}%`;
            layer.appendChild(line);

            const marker = document.createElement('div');
            marker.className = `destroy-marker marker-${ev.type}`;
            marker.style.left = `${xPos}%`;
            marker.style.top = `${yPos}%`;
            marker.innerHTML = `<img src="${ev.icon}" class="marker-img">`;
            marker.onclick = (e) => { e.stopPropagation(); renderLogs(ev.idx); };
            layer.appendChild(marker);
        });

        const area = document.getElementById('chart-area'), tt = document.getElementById('tooltip'), cur = document.getElementById('time-cursor');
        area.onmousemove = (e) => {
            const rect = area.getBoundingClientRect(), x = e.clientX - rect.left;
            const idx = Math.round((x/W)*duration), b = BUCKETS.get(idx);
            if (b) {
                cur.style.display = 'block'; cur.style.left = `${(idx/duration)*100}%`;
                tt.style.display = 'block'; tt.style.left = `${x > W/2 ? x-200 : x+20}px`; tt.style.top = `10px`;
                tt.innerHTML = `<div class="tooltip-header">${b.timeStr}</div><div class="tooltip-row"><span class="tooltip-label">아군 화력</span><span class="tooltip-val" style="color:var(--accent-blue)">${b.out.toLocaleString()}</span></div><div class="tooltip-row"><span class="tooltip-label">적군 화력</span><span class="tooltip-val" style="color:var(--accent-red)">${b.in.toLocaleString()}</span></div><div class="tooltip-row"><span class="tooltip-label">복구량</span><span class="tooltip-val" style="color:var(--accent-green)">${b.rep.toLocaleString()}</span></div>`;
            }
        };
        area.onmouseleave = () => { tt.style.display = 'none'; cur.style.display = 'none'; };
        area.onclick = (e) => { const rect = area.getBoundingClientRect(); renderLogs(Math.round(((e.clientX-rect.left)/W)*duration)); };
    }

    async function init() {
        if (typeof MOCK_LOGS !== 'undefined') { ALL_LOGS = MOCK_LOGS; draw(ALL_LOGS); renderLogs(null); }
    }
    init();
    window.onresize = () => draw(ALL_LOGS);
</script>
</body>
</html>
